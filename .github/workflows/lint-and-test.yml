name: Lint and Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-php:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - name: Install PHP CodeSniffer
        run: composer global require mediawiki/mediawiki-codesniffer
      - name: Run PHP lint
        run: |
          cd docker/skins/Wiki7
          ~/.composer/vendor/bin/phpcs --standard=MediaWiki includes/
        continue-on-error: true

  lint-js:
    name: JS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ESLint
        run: npm install -g eslint eslint-config-wikimedia
      - name: Run ESLint
        run: |
          cd docker/skins/Wiki7
          npx eslint resources/ || true
        continue-on-error: true

  test-cdk:
    name: CDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd cdk && npm ci
      - name: Run CDK tests
        run: cd cdk && npm test

  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: |
          cd data
          ruff check .
        continue-on-error: true
