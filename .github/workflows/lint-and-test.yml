name: Lint and Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-php:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
      - name: Install PHP CodeSniffer
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require mediawiki/mediawiki-codesniffer
      - name: Run PHP lint
        run: |
          cd docker/skins/Wiki7
          ~/.composer/vendor/bin/phpcs --standard=MediaWiki includes/
        continue-on-error: true

  lint-js:
    name: JS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ESLint
        run: npm install -g eslint eslint-config-wikimedia
      - name: Run ESLint
        run: |
          cd docker/skins/Wiki7
          npx eslint resources/ || true
        continue-on-error: true

  test-cdk:
    name: CDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd cdk && npm ci
      - name: Run CDK tests
        run: cd cdk && npm test

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd data
          pip install uv
          uv sync
      - name: Run linter
        run: |
          cd data
          uv run ruff check . || true
        continue-on-error: true
      - name: Run tests
        run: |
          cd data
          uv run pytest --tb=short -v
      - name: Run pipeline dry-run
        run: |
          cd data
          mkdir -p data_pipeline/output/2024 tmk-scraper/output/2024
          cp tests/fixtures/matches_sample.json tmk-scraper/output/2024/matches.json
          uv run python -c "
          from data_pipeline.normalize_enrich_players import main
          main(raw_path='tests/fixtures/players_sample.json', stats_path='tests/fixtures/stats_sample.json', out_dir='data_pipeline/output/2024')
          "
          uv run python run_pipeline.py --skip-scrape --skip-normalize --dry-run -v
