name: CDK Diff

on:
  pull_request:
    paths:
      - 'cdk/**'

jobs:
  cdk-diff:
    name: Show CDK Diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd cdk && npm ci
      - name: CDK Diff
        run: cd cdk && npx cdk diff --all 2>&1 || true
